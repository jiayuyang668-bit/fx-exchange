name: fx-stack

services:
  fx-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: fxdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - fx-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  fx-app-spring:
    build: ./fx-app-spring
    image: fx-app-spring:1.0
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://fx-db:3306/fxdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      FX_ORCHESTRATOR_URL: http://fx-orchestrator:8080
    depends_on:
      fx-db:
        condition: service_healthy

  fx-monitor:
    build: ./fx-monitor
    image: fx-monitor:1.0
    ports:
      - "${MONITOR_PORT:-3000}:80"
    environment:
      API_HOST: fx-app-spring
    depends_on:
      - fx-app-spring

  orchestrator-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: orchestratordb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "${ORCH_DB_PORT:-3308}:3306"
    volumes:
      - orchestrator-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  fx-orchestrator:
    build: ./fx-orchestrator
    image: fx-orchestrator:1.0
    ports:
      - "${ORCH_PORT:-8081}:8080"
    environment:
      DB_URL: jdbc:mysql://orchestrator-db:3306/orchestratordb
      DB_USERNAME: appuser
      DB_PASSWORD: apppass
      FX_TARGET_URL: http://fx-app-spring:8080
      FX_SELF_URL: http://fx-orchestrator:8080
    depends_on:
      orchestrator-db:
        condition: service_healthy
      fx-app-spring:
        condition: service_started

volumes:
  fx-db-data:
  orchestrator-db-data:
